<!doctype html>

  <body>

    <div class="switcher" id="hiSwitch" style="top: auto; bottom: 1rem">

      <button data-rgb="222,70,55">red</button>

      <button data-rgb="40,150,135">teal</button>
      <button data-rgb="60,120,210" aria-current="true">blue</button>
      <button data-rgb="120,90,200">violet</button>
      <button data-rgb="205,70,140">magenta</button>
      <button data-rgb="250,238,220">glow</button>
      <button data-rgb="58,56,47">ink</button>
    </div>

    <nav class="nav">
      <a class="nav-mark" href="#home">Bang-Shien&nbsp;Chen</a>
      <ul class="nav-links">
        <li><a href="#home">Home</a></li>
        <li><a href="#portfolio">Portfolio</a></li>
        <li><a href="#blog">Blog</a></li>
        <li><a href="#research">Research</a></li>
      </ul>
    </nav>

    <section id="home" class="hero">
      <canvas class="sig-canvas" id="sigCanvas"></canvas>

      <div class="hero-inner wrap">
        <div class="hero-text">
          <div class="hero-head reveal">
            <h1 class="hero-name">
              <span id="nameType">Bang-Shien</span><br /><em>Chen</em>
            </h1>
          </div>
          <div class="hero-meta stagger">
            <p class="hero-bio">
              Hi, I am a PhD student at Northeastern University.<br />
              My research interests are mainly in
              <span class="hl">Optimization</span> and
              <span class="hl">Robotics</span>.
            </p>
            <div class="hero-actions">
              <a class="btn" href="../docs/files/CV_Chen.pdf" target="_blank"
                >Curriculum Vitae ↗</a
              >
              <a class="btn" href="../docs/files/SOP_Chen.pdf" target="_blank"
                >Statement ↗</a
              >
            </div>
            <div class="hero-social">
              <a href="https://github.com/doggydoggy0101" target="_blank"
                >GitHub</a
              >
              <a href="mailto:dgbshien@gmail.com">Email</a>
              <a href="https://www.youtube.com/@doggydoggy0101" target="_blank"
                >YouTube</a

          </div>
        </div>

      <div class="hero-foot">
        <span class="scroll-cue">Scroll</span>
      </div>
    </section>

    <script src="js/main.js"></script>
    <script src="js/bunny.js"></script>
    <script>
      const root = document.documentElement;
      document.querySelectorAll("#heroSwitch button").forEach((btn) => {
        btn.addEventListener("click", () => {
          root.dataset.hero = btn.dataset.hero;
          document
            .querySelectorAll("#heroSwitch button")
            .forEach((b) => b.removeAttribute("aria-current"));
          btn.setAttribute("aria-current", "true");
        });
      });
      document.querySelectorAll("#hiSwitch button").forEach((btn) => {
        btn.addEventListener("click", () => {
          HI = btn.dataset.rgb.split(",").map(Number);
          document
            .querySelectorAll("#hiSwitch button")
            .forEach((b) => b.removeAttribute("aria-current"));
          btn.setAttribute("aria-current", "true");
        });
      });

      const cv = document.getElementById("sigCanvas");
      const ctx = cv.getContext("2d");
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const reduce = window.matchMedia(
        "(prefers-reduced-motion: reduce)",
      ).matches;
      let W = 1,
        H = 1,
        mx = 0,
        my = 0,
        cuX = -1e5,
        cuY = -1e5,
        lcuX = -1e5,
        lcuY = -1e5;
      const ACCENT = "176,122,100";
      const MUTED = "140,131,116";
      let HI = [60, 120, 210]; // highlight colour — cool contrast (--contrast)
      function size() {
        const r = cv.getBoundingClientRect();
        const nw = Math.max(1, Math.round(r.width * dpr));
        const nh = Math.max(1, Math.round(r.height * dpr));
        if (nw !== W || nh !== H) {
          W = cv.width = nw;
          H = cv.height = nh;
        }
      }

      // pose-graph edges: connect each point to its 2 nearest neighbours (once)
      const N = BUNNY.length;
      const EDGES = [];
      for (let i = 0; i < N; i++) {
        let a = -1,
          b = -1,
          da = 1e9,
          db = 1e9;
        const p = BUNNY[i];
        for (let j = 0; j < N; j++) {
          if (j === i) continue;
          const q = BUNNY[j];
          const dx = p[0] - q[0],
            dy = p[1] - q[1],
            dz = p[2] - q[2];
          const d = dx * dx + dy * dy + dz * dz;
          if (d < da) {
            db = da;
            b = a;
            da = d;
            a = j;
          } else if (d < db) {
            db = d;
            b = j;
          }
        }
        if (a > i) EDGES.push([i, a]); // dedupe by ordering
        if (b > i) EDGES.push([i, b]);
      }

      const sx = new Float32Array(N),
        sy = new Float32Array(N),
        dep = new Float32Array(N),
        hl = new Float32Array(N); // cursor-proximity highlight 0..1

      // Gaussian-noise targets (the ε of a diffusion model), regenerated per cycle
      function gauss() {
        let u = 0,
          v = 0;
        while (u === 0) u = Math.random();
        while (v === 0) v = Math.random();
        return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
      }
      const SIGMA = 0.4;
      function genNoise() {
        const a = [];
        for (let i = 0; i < N; i++)
          a.push([gauss() * SIGMA, gauss() * SIGMA, gauss() * SIGMA]);
        return a;
      }
      let eps = genNoise();
      const easeInOut = (p) =>
        p < 0.5 ? 4 * p * p * p : 1 - Math.pow(-2 * p + 2, 3) / 2;

      // ---- shared timeline = a diffusion model ----
      //   Bang-Shien = clean bunny (data x0)   <->   Ian = pure Gaussian noise (x_T)
      const nameEl = document.getElementById("nameType");
      let phase = "bunny",
        pStart = performance.now(),
        morph = 0; // 0 = bunny, 1 = noise
      const DUR = { bunny: 2600, diffuse: 1600, noise: 2400, denoise: 1600 };
      function nameMorph(p, from, to) {
        if (p < 0.5)
          nameEl.textContent = from.slice(
            0,
            Math.round(from.length * (1 - p * 2)),
          );
        else
          nameEl.textContent = to.slice(0, Math.round(to.length * (p * 2 - 1)));
      }
      function routine(now) {
        if (reduce) {
          morph = 0;
          nameEl.textContent = "Bang-Shien";
          return;
        }
        const el = now - pStart;
        if (phase === "bunny") {
          morph = 0;
          nameEl.textContent = "Bang-Shien";
          if (el >= DUR.bunny) {
            phase = "diffuse";
            pStart = now;
            eps = genNoise();
          }
        } else if (phase === "diffuse") {
          const p = Math.min(1, el / DUR.diffuse);
          morph = easeInOut(p);
          nameMorph(p, "Bang-Shien", "Ian");
          if (el >= DUR.diffuse) {
            phase = "noise";
            pStart = now;
          }
        } else if (phase === "noise") {
          morph = 1;
          nameEl.textContent = "Ian";
          if (el >= DUR.noise) {
            phase = "denoise";
            pStart = now;
          }
        } else {
          const p = Math.min(1, el / DUR.denoise);
          morph = 1 - easeInOut(p);
          nameMorph(p, "Ian", "Bang-Shien");
          if (el >= DUR.denoise) {
            phase = "bunny";
            pStart = now;
          }
        }
      }

      function drawCloud(now) {
        routine(now);
        const ax = my * 0.4;
        const ay = -0.5 + mx * 0.5; // fixed 3/4 view + cursor parallax (no auto-spin)
        const cx = W * 0.72,
          cy = H * 0.52,
          R = Math.min(W, H) * 0.24;
        const ca = Math.cos(ay),
          sa = Math.sin(ay),
          cb = Math.cos(ax),
          sb = Math.sin(ax);
        const ka = Math.sqrt(1 - morph),
          kb = Math.sqrt(morph);
        for (let i = 0; i < N; i++) {
          const h = BUNNY[i],
            s = eps[i];
          const X = h[0] * ka + s[0] * kb;
          const Y = h[1] * ka + s[1] * kb;
          const Z = h[2] * ka + s[2] * kb;
          const x1 = X * ca - Z * sa;
          const z1 = X * sa + Z * ca;
          const y1 = Y * cb - z1 * sb;
          const z2 = Y * sb + z1 * cb;
          dep[i] = (z2 + 1) / 2;
          sx[i] = cx + x1 * R + mx * 26 * dpr;
          sy[i] = cy - y1 * R; // upright
        }
        // cursor proximity highlight — lagged cursor + eased per-point glow (afterglow)
        lcuX += (cuX - lcuX) * 0.3;
        lcuY += (cuY - lcuY) * 0.3;
        const RAD = 120 * dpr,
          RAD2 = RAD * RAD;
        for (let i = 0; i < N; i++) {
          const dx = sx[i] - lcuX,
            dy = sy[i] - lcuY,
            dd = dx * dx + dy * dy;
          const t0 = dd < RAD2 ? 1 - Math.sqrt(dd) / RAD : 0;
          hl[i] += (t0 - hl[i]) * 0.2; // smooth fade in/out → lag + afterglow
        }

        // edges (pose graph) — fade out as it scatters into noise, glow near cursor
        ctx.lineWidth = dpr;
        const edgeFade = 1 - morph * 0.35;
        for (let e = 0; e < EDGES.length; e++) {
          const i = EDGES[e][0],
            j = EDGES[e][1];
          let a = (0.05 + ((dep[i] + dep[j]) / 2) * 0.2) * edgeFade;
          a += Math.max(hl[i], hl[j]) * 0.4;
          ctx.strokeStyle = `rgba(${MUTED},${a})`;
          ctx.beginPath();
          ctx.moveTo(sx[i], sy[i]);
          ctx.lineTo(sx[j], sy[j]);
          ctx.stroke();
        }
        // nodes — shift rose -> gold, grow & brighten within the cursor spotlight
        for (let i = 0; i < N; i++) {
          const t = hl[i];
          let alpha = 0.16 + dep[i] * 0.6;
          let rad = (0.4 + dep[i] * 1.4) * dpr;
          let col = ACCENT;
          if (t > 0) {
            const r = (176 + (HI[0] - 176) * t) | 0;
            const g = (122 + (HI[1] - 122) * t) | 0;
            const b = (100 + (HI[2] - 100) * t) | 0;
            col = `${r},${g},${b}`;
            alpha = alpha + (1 - alpha) * t;
            rad *= 1 + t * 1.8;
          }
          ctx.beginPath();
          ctx.arc(sx[i], sy[i], rad, 0, 7);
          ctx.fillStyle = `rgba(${col},${alpha})`;
          ctx.fill();
        }
      }

      function loop(now) {
        if (root.dataset.hero === "cloud") {
          try {
            size();
            ctx.clearRect(0, 0, W, H);
            drawCloud(now || performance.now());
          } catch (e) {
            /* keep loop alive */
          }
        }
        requestAnimationFrame(loop);
      }
      window.addEventListener("resize", size);
      window.addEventListener("mousemove", (e) => {
        mx = e.clientX / window.innerWidth - 0.5;
        my = e.clientY / window.innerHeight - 0.5;
        const r = cv.getBoundingClientRect();
        cuX = (e.clientX - r.left) * dpr;
        cuY = (e.clientY - r.top) * dpr;
      });
      size();
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
